<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chelsea News Feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: #034694;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 { font-size: 1.5rem; font-weight: 800; }

    main { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

    .source-badge {
      display: inline-block;
      background: #1a1a2e;
      color: #a0a0ff;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .article {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .article:hover { border-color: #034694; }

    .article h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .article a {
      color: #fff;
      text-decoration: none;
    }

    .article a:hover { text-decoration: underline; }

    .article .meta {
      font-size: 0.78rem;
      color: #888;
      margin-top: 10px;
    }

    .loading, .error, .empty {
      text-align: center;
      padding: 48px;
      color: #666;
      font-size: 0.95rem;
    }

    .error { color: #ff6b6b; }

    #refresh {
      background: #034694;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 20px;
    }

    #refresh:hover { background: #0250a0; }
  </style>
</head>
<body>

<header>
  <h1>Chelsea News</h1>
</header>

<main>
  <button id="refresh">↻ Refresh</button>
  <div id="feed">Loading...</div>
</main>

<script>
  const API_BASE = ''; // Vercel serverless functions, same origin

  async function fetchArticles() {
    const feed = document.getElementById('feed');
    feed.textContent = 'Loading...';

    try {
      const res = await fetch(`${API_BASE}/api/articles`);
      const data = await res.json();

      if (!data.success) throw new Error(data.error || 'Unknown error');

      const articles = data.articles;

      if (!articles.length) {
        feed.innerHTML = '<div class="empty">No articles yet — scraper hasn\'t run.</div>';
        return;
      }

      feed.innerHTML = articles.map(article => `
        <article class="article">
          <span class="source-badge">${escapeHtml(article.source)}</span>
          <h2><a href="${escapeHtml(article.link)}" target="_blank" rel="noopener">${escapeHtml(article.title)}</a></h2>
          <div class="meta">${formatDate(article.published_at)}</div>
        </article>
      `).join('');

    } catch (err) {
      feed.innerHTML = `<div class="error">Failed to load: ${escapeHtml(err.message)}</div>`;
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function formatDate(isoString) {
    if (!isoString) return '';
    const d = new Date(isoString);
    return d.toLocaleDateString('en-GB', {
      day: 'numeric', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  document.getElementById('refresh').addEventListener('click', fetchArticles);
  fetchArticles();
</script>

</body>
</html>
